[[redirects]]
  from = "/app"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/auth.html"
  status = 301

[[redirects]]
  from = "/signup"
  to = "/auth.html"
  status = 301

[[redirects]]
  from = "/register"
  to = "/auth.html"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/donate"
  to = "/support.html"
  status = 301

[[redirects]]
  from = "/invest"
  to = "/support.html#invest"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[build]
  publish = "."

[dev]
  port = 8888
