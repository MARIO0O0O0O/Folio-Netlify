[[redirects]]
  from = "/app"
  to = "/pages/dashboard.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/pages/dashboard.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/pages/auth.html"
  status = 301

[[redirects]]
  from = "/signup"
  to = "/pages/auth.html"
  status = 301

[[redirects]]
  from = "/register"
  to = "/pages/auth.html"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/donate"
  to = "/pages/support.html"
  status = 301

[[redirects]]
  from = "/invest"
  to = "/pages/support.html#invest"
  status = 301

[[redirects]]
  from = "/@*"
  to = "/pages/profile.html?u=:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

