<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — FOLIO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--paper:#09090b;--accent:#00ff87;--accent-text:#00cc6a;--text-primary:#f4f1ec;--text-secondary:#8a8680;--text-muted:#3d3b39;--font-display:'DM Serif Display',Georgia,serif;--font-ui:'Syne',sans-serif;--font-mono:'JetBrains Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-ui);background:var(--paper);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;-webkit-font-smoothing:antialiased;}
.wrap{max-width:480px;}
.num{font-family:var(--font-display);font-size:7rem;font-weight:400;line-height:1;color:var(--text-muted);margin-bottom:1rem;}
.num span{color:var(--accent);}
h1{font-family:var(--font-display);font-size:2rem;font-weight:400;margin-bottom:.75rem;letter-spacing:-.02em;}
p{font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:2rem;}
.handle{font-family:var(--font-mono);font-size:13px;color:var(--accent-text);background:rgba(0,255,135,.08);border:1px solid rgba(0,255,135,.15);padding:8px 18px;border-radius:100px;display:inline-block;margin-bottom:2rem;}
.links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.link{font-size:13px;padding:10px 22px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--text-secondary);cursor:pointer;text-decoration:none;transition:all .15s;}
.link.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.link.primary:hover{background:#00e87a;}
.link:hover{background:rgba(255,255,255,.05);color:var(--text-primary);}
</style>
</head>
<body>
<div class="wrap">
  <div class="num">4<span>0</span>4</div>
  <h1>This handle doesn't exist.</h1>
  <p>The profile you're looking for hasn't been claimed yet — or you may have typed the URL incorrectly.</p>
  <div class="handle">folio.so/[handle not found]</div>
  <div class="links">
    <a class="link primary" href="index.html">← Back to FOLIO</a>
    <a class="link" href="auth.html">Claim this handle</a>
    <a class="link" href="discover.html">Browse profiles</a>
  </div>
</div>
</body>
</html>
