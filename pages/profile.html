<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | FOLIO</title>
<meta name="description" content="Professional profile on FOLIO.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #0a0a0a;
  --surface: #111111;
  --surface-2: #161616;
  --surface-3: #1c1c1c;
  --border: rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.12);
  --text-primary: #f0ede8;
  --text-secondary: #888580;
  --text-muted: #3f3d3b;
  --accent: #00ff87;
  --accent-dim: rgba(0,255,135,0.10);
  --accent-text: #00cc6a;
  --gold: #c8a96e;
  --gold-dim: rgba(200,169,110,0.10);
  --blue: #4488ff;
  --blue-dim: rgba(68,136,255,0.08);
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-ui: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 6px;
  --radius-lg: 10px;
  --radius-xl: 14px;
  --max-w: 780px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-ui);
  background: var(--paper);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ─── NOISE ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.35;
}

/* ─── NAV BAR ─── */
.profile-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-secondary);
  text-decoration: none;
  cursor: pointer;
  transition: color 0.15s;
}

.nav-logo:hover { color: var(--text-primary); }

.logo-mark {
  width: 20px; height: 20px;
  background: var(--accent);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 700;
  color: #000;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-handle {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-ui);
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.btn-primary {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

.btn-primary:hover {
  background: #00e87a;
  box-shadow: 0 4px 16px rgba(0,255,135,0.2);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border-color: var(--border-bright);
}

.btn-ghost:hover {
  background: var(--surface);
  color: var(--text-primary);
  border-color: rgba(255,255,255,0.2);
}

/* ─── LAYOUT ─── */
.profile-wrap {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 1.5rem 6rem;
  position: relative;
  z-index: 1;
  display: none; /* Hidden until loaded */
}

.profile-wrap.visible { display: block; }

/* ─── HERO ─── */
.hero-section {
  padding: 3.5rem 0 2.5rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2.5rem;
}

.hero-top {
  display: flex;
  align-items: flex-start;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
}

.avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(0,255,135,0.15), rgba(0,255,135,0.05));
  border: 1px solid rgba(0,255,135,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  color: var(--accent-text);
  font-family: var(--font-ui);
  flex-shrink: 0;
  position: relative;
  background-size: cover;
  background-position: center;
}

.avatar-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px solid rgba(0,255,135,0.1);
}

.hero-identity { flex: 1; min-width: 0; }

.hero-name {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  line-height: 1.1;
  margin-bottom: 6px;
}

.hero-headline {
  font-size: 1rem;
  color: var(--text-secondary);
  margin-bottom: 10px;
  font-weight: 500;
}

.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.meta-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  padding: 3px 10px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
}

.meta-chip.work-status {
  border-color: rgba(0,255,135,0.2);
  background: rgba(0,255,135,0.06);
  color: var(--accent-text);
}

.status-pulse {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.6); }
}

.meta-chip a {
  color: inherit;
  text-decoration: none;
}

/* Handle + actions row */
.hero-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 1.5rem;
}

.handle-badge {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.handle-badge span { color: var(--accent-text); }

/* ─── SECTION LAYOUT ─── */
.section { margin-bottom: 3rem; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.section-title { font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
.section-title::before { content: '//'; color: var(--accent-text); opacity: 0.5; }

/* ─── README ─── */
.readme-block { font-size: 15px; line-height: 1.8; color: var(--text-secondary); max-width: 65ch; }
.readme-block p { margin-bottom: 1em; }
.readme-block strong { color: var(--text-primary); font-weight: 600; }
.readme-block a { color: var(--accent-text); text-decoration: underline; text-underline-offset: 3px; }
.readme-block h3 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 400; color: var(--text-primary); margin: 1.5em 0 0.5em; }

/* ─── LOADER ─── */
.loader-wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--paper); z-index: 1000; transition: opacity 0.4s; }
.loader { width: 30px; height: 30px; border: 2px solid var(--surface-3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── TOAST ─── */
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface-3); border: 1px solid var(--border-bright); border-radius: var(--radius-lg); padding: 10px 18px; font-size: 12px; font-family: var(--font-mono); color: var(--text-primary); z-index: 9999; display: flex; align-items: center; gap: 8px; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

@media (max-width: 600px) {
  .profile-nav { padding: 0 1rem; }
  .profile-wrap { padding: 0 1rem 4rem; }
  .hero-top { gap: 1rem; }
  .avatar { width: 56px; height: 56px; font-size: 17px; }
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }
</style>
</head>
<body>

<div class="loader-wrap" id="loader">
  <div class="loader"></div>
</div>

<!-- ─── NAV ─── -->
<nav class="profile-nav">
  <a class="nav-logo" href="../index.html">
    <div class="logo-mark">F</div>
    folio
  </a>
  <div class="nav-right">
    <span class="nav-handle" id="nav-handle">@...</span>
    <button class="btn btn-ghost" onclick="copyHandle()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy link
    </button>
    <button class="btn btn-primary" id="contact-btn">Contact</button>
  </div>
</nav>

<!-- ─── PROFILE ─── -->
<div class="profile-wrap" id="profile-content">

  <!-- HERO -->
  <section class="hero-section">
    <div class="hero-top">
      <div class="avatar" id="p-avatar">
        <span id="p-initial"></span>
        <div class="avatar-ring"></div>
      </div>
      <div class="hero-identity">
        <h1 class="hero-name" id="p-name">Loading...</h1>
        <div class="hero-headline" id="p-headline">Professional Handle</div>
        <div class="hero-meta" id="p-meta">
          <!-- Dynamically filled -->
        </div>
      </div>
    </div>

    <div class="hero-actions">
      <div class="handle-badge">folio.so/<span id="p-handle">@...</span></div>
    </div>
  </section>

  <!-- README -->
  <section class="section">
    <div class="section-header">
      <div class="section-title">About</div>
    </div>
    <div class="readme-block" id="p-bio">
      <!-- Dynamically filled -->
    </div>
  </section>

  <!-- Placeholder for other sections (Projects, Skills, etc.) -->
  <div id="dynamic-sections"></div>

  <!-- FOOTER -->
  <div class="profile-footer">
    <div class="footer-left">
      Powered by <a href="../index.html">FOLIO</a>
    </div>
  </div>

</div>

<!-- ─── TOAST ─── -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.1"></script>
<script type="module">
import { getPublicProfile } from '../lib/profiles.js';

async function loadProfile() {
  const params = new URLSearchParams(window.location.search);
  const username = params.get('u');

  if (!username) {
    showToast('No user specified');
    setTimeout(() => window.location.href = '../index.html', 2000);
    return;
  }

  try {
    const profile = await getPublicProfile(username);
    if (!profile) {
      document.getElementById('p-name').textContent = 'User not found';
      return;
    }

    renderProfile(profile);
  } catch (error) {
    console.error(error);
    showToast('Error loading profile');
  } finally {
    document.getElementById('loader').style.opacity = '0';
    setTimeout(() => document.getElementById('loader').style.display = 'none', 400);
    document.getElementById('profile-content').classList.add('visible');
  }
}

function renderProfile(p) {
  document.title = `${p.full_name || p.username} | FOLIO`;
  document.getElementById('nav-handle').textContent = '@' + p.username;
  document.getElementById('p-handle').textContent = '@' + p.username;
  document.getElementById('p-name').textContent = p.full_name || p.username;
  document.getElementById('p-headline').textContent = p.headline || 'FOLIO Member';
  document.getElementById('p-bio').innerHTML = p.bio ? `<p>${p.bio.replace(/\n/g, '</p><p>')}</p>` : '<p>No bio shared yet.</p>';
  
  if (p.avatar_url) {
    document.getElementById('p-avatar').style.backgroundImage = `url(${p.avatar_url})`;
    document.getElementById('p-initial').style.display = 'none';
  } else {
    document.getElementById('p-initial').textContent = (p.full_name || p.username).charAt(0).toUpperCase();
  }

  // Meta chips
  const meta = document.getElementById('p-meta');
  meta.innerHTML = '';
  if (p.location) {
    meta.innerHTML += `<div class="meta-chip">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      ${p.location}
    </div>`;
  }
  if (p.website_url) {
    meta.innerHTML += `<div class="meta-chip">
      <a href="${p.website_url}" target="_blank">Website</a>
    </div>`;
  }
  
  document.getElementById('contact-btn').textContent = `Contact ${p.full_name?.split(' ')[0] || 'User'}`;
}

loadProfile();

window.copyHandle = function() {
  const url = window.location.href;
  if(navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
  }
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
