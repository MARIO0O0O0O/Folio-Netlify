<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOLIO — Join the Beta</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--paper:#09090b;--surface:#111113;--surface-2:#17171a;--surface-3:#1e1e22;--border:rgba(255,255,255,0.07);--border-bright:rgba(255,255,255,0.13);--text-primary:#f4f1ec;--text-secondary:#8a8680;--text-muted:#3d3b39;--accent:#00ff87;--accent-dim:rgba(0,255,135,0.09);--accent-text:#00cc6a;--red:#ff4444;--font-display:'DM Serif Display',Georgia,serif;--font-ui:'Syne',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:6px;--radius-lg:12px;--radius-xl:18px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-ui);background:var(--paper);color:var(--text-primary);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4;}
.auth-card{background:var(--surface);border:1px solid var(--border-bright);border-radius:var(--radius-xl);padding:2.5rem;width:100%;max-width:440px;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,0,0.5);}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;margin-bottom:2rem;justify-content:center;}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#000;}
.logo-text{font-family:var(--font-mono);font-size:15px;font-weight:500;color:var(--text-primary);}
.heading{font-family:var(--font-display);font-size:2rem;text-align:center;margin-bottom:0.5rem;}
.subheading{font-size:14px;color:var(--text-secondary);text-align:center;margin-bottom:2rem;line-height:1.6;}
.form-group{margin-bottom:1.25rem;}
.label{display:block;font-size:10px;font-family:var(--font-mono);text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px;letter-spacing:0.05em;}
.input{width:100%;padding:12px 14px;background:var(--surface-2);border:1px solid var(--border-bright);border-radius:var(--radius);color:var(--text-primary);font-size:14px;outline:none;transition:all 0.2s;}
.input:focus{border-color:var(--accent);background:var(--surface-3);}
.submit-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:var(--radius);color:#000;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:1rem;}
.submit-btn:hover:not(:disabled){background:#00e87a;transform:translateY(-1px);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
.switch-mode{text-align:center;margin-top:1.5rem;font-size:13px;color:var(--text-secondary);}
.switch-mode span{color:var(--accent-text);cursor:pointer;font-weight:600;}
.error-msg{color:var(--red);font-size:12px;margin-top:1rem;text-align:center;display:none;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface-3);border:1px solid var(--border-bright);border-radius:var(--radius-lg);padding:10px 20px;font-size:12px;font-family:var(--font-mono);color:var(--text-primary);z-index:9999;transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="auth-card">
  <a class="logo" href="../index.html">
    <div class="logo-mark">F</div>
    <span class="logo-text">folio</span>
  </a>

  <div id="signup-view">
    <h1 class="heading">Claim your handle.</h1>
    <p class="subheading">Join the beta and build your live professional profile in 60 seconds.</p>
    
    <div class="form-group">
      <label class="label">Full Name</label>
      <input type="text" id="s-name" class="input" placeholder="Enter your name">
    </div>
    <div class="form-group">
      <label class="label">Email Address</label>
      <input type="email" id="s-email" class="input" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="label">Password</label>
      <input type="password" id="s-pw" class="input" placeholder="Minimum 8 characters">
    </div>

    <button class="submit-btn" id="signup-btn" onclick="handleSignUp()">Create account & claim handle →</button>
    
    <div class="switch-mode">Already have an account? <span onclick="toggleMode()">Sign in</span></div>
  </div>

  <div id="login-view" style="display:none">
    <h1 class="heading">Welcome back.</h1>
    <p class="subheading">Access your career vault.</p>
    
    <div class="form-group">
      <label class="label">Email Address</label>
      <input type="email" id="l-email" class="input" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="label">Password</label>
      <input type="password" id="l-pw" class="input" placeholder="Enter your password">
    </div>

    <button class="submit-btn" id="login-btn" onclick="handleSignIn()">Sign in →</button>
    
    <div class="switch-mode">Don't have an account? <span onclick="toggleMode()">Sign up</span></div>
  </div>

  <div id="error-box" class="error-msg"></div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.1"></script>
<script type="module">
import { signUp, signIn, getCurrentUser } from '../lib/auth.js';
import { checkUsernameAvailable, updateProfile } from '../lib/profiles.js';

let currentMode = 'signup';

window.toggleMode = () => {
  currentMode = currentMode === 'signup' ? 'login' : 'signup';
  document.getElementById('signup-view').style.display = currentMode === 'signup' ? 'block' : 'none';
  document.getElementById('login-view').style.display = currentMode === 'login' ? 'block' : 'none';
  document.getElementById('error-box').style.display = 'none';
};

window.handleSignUp = async () => {
  const name = document.getElementById('s-name').value.trim();
  const email = document.getElementById('s-email').value.trim();
  const pw = document.getElementById('s-pw').value;
  const btn = document.getElementById('signup-btn');

  if (!name || !email || pw.length < 8) {
    showError('Please fill all fields correctly (Password min 8 chars).');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating vault...';

  try {
    const data = await signUp(email, pw, name);
    const user = data.user;
    
    // Auto-generate handle from name
    let handle = name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '').slice(0, 20);
    
    // Verify if handle is available, if not, add random suffix
    const isAvailable = await checkUsernameAvailable(handle);
    if (!isAvailable) {
      handle += '-' + Math.random().toString(36).substring(2, 5);
    }

    // Update profile with the auto-handle
    await updateProfile({ username: handle, full_name: name });

    showToast('✦ Vault created! Redirecting...');
    setTimeout(() => window.location.href = 'dashboard.html', 1500);

  } catch (error) {
    showError(error.message);
    btn.disabled = false;
    btn.textContent = 'Create account & claim handle →';
  }
};

window.handleSignIn = async () => {
  const email = document.getElementById('l-email').value.trim();
  const pw = document.getElementById('l-pw').value;
  const btn = document.getElementById('login-btn');

  if (!email || !pw) {
    showError('Please enter your credentials.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Opening vault...';

  try {
    await signIn(email, pw);
    window.location.href = 'dashboard.html';
  } catch (error) {
    showError(error.message);
    btn.disabled = false;
    btn.textContent = 'Sign in →';
  }
};

function showError(msg) {
  const err = document.getElementById('error-box');
  err.textContent = msg;
  err.style.display = 'block';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Redirect if already logged in
async function init() {
  const user = await getCurrentUser();
  if (user) window.location.href = 'dashboard.html';
}
init();
</script>
</body>
</html>
