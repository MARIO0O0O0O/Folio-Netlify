<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOLIO — Admin Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--paper:#09090b;--surface:#111113;--surface-2:#17171a;--border:rgba(255,255,255,0.07);--border-bright:rgba(255,255,255,0.13);--text-primary:#f4f1ec;--text-secondary:#8a8680;--accent:#00ff87;--accent-dim:rgba(0,255,135,0.09);--accent-text:#00cc6a;--font-display:'DM Serif Display',serif;--font-ui:'Syne',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:6px;}
body{font-family:var(--font-ui);background:var(--paper);color:var(--text-primary);padding:3rem;max-width:800px;margin:0 auto;}
h1{font-family:var(--font-display);font-size:2.5rem;margin-bottom:2rem;}
.admin-card{background:var(--surface);border:1px solid var(--border-bright);border-radius:12px;padding:2rem;margin-bottom:2rem;}
.form-group{margin-bottom:1.5rem;}
.label{display:block;font-size:11px;font-family:var(--font-mono);text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px;}
.input{width:100%;padding:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-family:var(--font-mono);outline:none;}
.btn{padding:12px 24px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);font-weight:700;cursor:pointer;}
.table{width:100%;border-collapse:collapse;margin-top:2rem;}
.table th{text-align:left;font-size:11px;font-family:var(--font-mono);color:var(--text-secondary);padding:12px;border-bottom:1px solid var(--border);}
.table td{padding:12px;border-bottom:1px solid var(--border);font-size:13px;font-family:var(--font-mono);}
.status-pill{padding:2px 8px;border-radius:100px;font-size:10px;background:var(--accent-dim);color:var(--accent-text);}
.status-pill.used{background:rgba(255,255,255,0.05);color:var(--text-secondary);}
</style>
</head>
<body>
  <h1>Admin Terminal</h1>
  
  <div class="admin-card">
    <div class="form-group">
      <label class="label">Generate New Invite Code</label>
      <div style="display:flex; gap:10px">
        <input type="text" id="new-code" class="input" placeholder="e.g. INVESTOR-2026">
        <button class="btn" onclick="createNewCode()">Generate</button>
      </div>
    </div>
  </div>

  <div class="admin-card">
    <label class="label">Active & Used Codes</label>
    <table class="table">
      <thead>
        <tr><th>Code</th><th>Status</th><th>Used By</th><th>Created</th></tr>
      </thead>
      <tbody id="invite-table-body">
        <!-- Dynamically filled -->
      </tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.1"></script>
  <script type="module">
    import { listAllInvites, generateInviteCode } from './lib/admin.js';
    import { getOwnProfile } from './lib/profiles.js';

    async function checkAuth() {
      const profile = await getOwnProfile();
      if (!profile || !profile.is_admin) {
        alert("Access Denied: Admin privileges required.");
        window.location.href = 'pages/auth.html';
      }
      loadInvites();
    }

    async function loadInvites() {
      const invites = await listAllInvites();
      const tbody = document.getElementById('invite-table-body');
      tbody.innerHTML = invites.map(inv => `
        <tr>
          <td style="color:var(--accent-text)">${inv.code}</td>
          <td><span class="status-pill ${inv.status}">${inv.status.toUpperCase()}</span></td>
          <td>${inv.profiles ? inv.profiles.full_name : '--'}</td>
          <td style="color:var(--text-secondary)">${new Date(inv.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('');
    }

    window.createNewCode = async () => {
      const input = document.getElementById('new-code');
      if (!input.value) return;
      try {
        await generateInviteCode(input.value);
        input.value = '';
        loadInvites();
      } catch (e) { alert(e.message); }
    };

    checkAuth();
  </script>
</body>
</html>
